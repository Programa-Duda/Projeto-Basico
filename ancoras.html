<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!--
    A tag <a>, que significa âncora, serve para linkar algo. Nisso, colocamos a propriedade 
        "href" para levar o usuário para um local exterior / link externo.
    Utiliza-se a propriedade "target" para abrir o link em uma aba separada.
    A propriedade "rel" é para representar ao motor de busca (como o Google) que o link é algo externo.
    -->
    <h1> Currículo Virtual </h1>
    <p> Você pode acessar o meu Linkedin clicando <a href="https://www.linkedin.com/in/maria-eduarda-pereira-a6b005344/?skipRedirect=true" target="_blank" rel="exterior">aqui</a>.</p>
    <br>

    
    <!-- 
    Pode ser utilizado a tag <hr> para criar uma linha de separação.
    -->
    <hr>


    <!--
    Uma tag âncora também pode ser utilizada para redirecionar páginas, como exemplificado abaixo.
    -->
    <p> Acesse a minha <b>Página de Contato</b> clicando <a href="pagina_contato/contato.html">aqui</a>.</p>


</body>
</html>
