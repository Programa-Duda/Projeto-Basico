<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <h1> Hello World!</h1> 

   <!--
   Para fazer uma quebra é só usar <br>, que é uma tag sem fechamento.
   -->
   <p>
    Fazendo um parágrafo com <br>
    QUEBRA!
   </p>

   <!--
   É possível editar o texto de diferentes formas, como representado abaixo.
   -->
   <p>
    Texto em <b>negrito</b> <br>
    Texto <strong>importante</strong>, para marcações de palavras-chave <br>
    Texto em <i>itálico</i> <br>
    Texto com tag <em>ênfase</em> <br>
    Texto <mark>marcado</mark>
   </p>

   <!--
   É possível também sublinhar ou apagar textos.
   -->
   <p>
    Texto <u>sublinhado</u> <br>
    Texto <del>apagado</del>
   </p>

   <!--
   Por fim, possuímos também a opção de Sobrescrever algo e Subescrever.
   -->
   <p>
    Sobrescrito: 10<sup>2</sup> <br>
    Subescrito: H<sub>2</sub>O 
   </p>

</body>
</html>
