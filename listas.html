<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    
    <!--
    Para desenvolver diferentes listas basta usar a tag <ul> para criar a lista e a tag 
        <il> para os "itens listados".
    -->
    <h3>Lista não ordenhada (UL)</h3>
    <ul>
        <li>Ovo</li>
        <li>Pão</li>

            <ul>
                <li>Salame</li>
                <li>Presunto</li>
                <li>Alface</li>
            </ul>
    </ul>

    <!--
    Listas possuem diferentes tipos (types), como: "disc", "square" e "circle";
    Esse valor NÃO É MAIS UTILIZADO, o estilo / style agora é feito atravez do CSS.
    -->
    <h3>Types de Listas</h3>
    <ul type="square">
    <li>Quadrado</li>
    <li>Quadrado</li>
    <li>Quadrado</li>
    </ul>

    <!--
    Criando sub-itens utilizando a tag <ol>.
    -->
    <h3>Sub-itens em Listas</h3>
     <ul>
        <li>Ovo</li>
        <li>
            Pão
            <ol>
                <li>Presunto</li>
                <li>Alface</li>
            </ol>
        </li>
    </ul>

</body>
</html>
