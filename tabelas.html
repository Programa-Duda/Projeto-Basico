<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <!--
    Uma tabela é composta por cabeçalho / colunas, linhas e dados.
    A tag <table> cria uma tabela onde outras tags serão inseridas.
    Utiliza-se <caption> para definir um título à tabela.
    A tag <tr> representa linhas.
    Já a tag <th> é o cabeçalho da tabela, representando as principais categorias.
    Por fim, a tag <td> serão os dados. Estes devem seguir a sequência 
        definida pelo cabeçalho para que não haja confusão.
    -->


    <h1> Trabalhando com Tabelas </h1>

    <table>
        <caption> Serviços Prestados </caption>
        <tr>
            <th>Data</th>
            <th>Serviço</th>
            <th>Preço</th>
            <th>Status</th>
        </tr>

        <tr>
            <td>02/02/2026</td>
            <td>Troca de Óleo</td>
            <td>R$200,00</td>
            <td>Concluído</td>
        </tr>


        <tr>
            <td>06/03/2026</td>
            <td>Concerto Câmbio</td>
            <td>R$750,00</td>
            <td>Em andamento</td>
        </tr>

    </table>

</body>
</html>
